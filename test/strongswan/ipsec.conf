# strongSwan roadwarrior config for go-ipsec interop, negotiating exactly the
# suites go-ipsec implements: AES-CBC-256 / PRF+INTEG HMAC-SHA2-256 / DH x25519
# (group 31, MODP-2048 as fallback) for IKE, and the full negotiable ESP table —
# AES-256-GCM-16, ChaCha20-Poly1305, AES-CBC-256 / HMAC-SHA2-256-128 — with
# x25519 PFS. Listing all three server-side lets the e2e cipher-suite matrix pin
# each one in turn from the client. Two roadwarrior conns share the same
# gateway: `rw` authenticates the client with EAP-MSCHAPv2 (server cert),
# `rw-psk` with a pre-shared key (no cert). charon selects between them by the
# client's AUTH method + IDi at IKE_AUTH.
config setup
    charondebug="ike 1, knl 1, cfg 0, net 1"
    uniqueids=never

conn %default
    keyexchange=ikev2
    dpdaction=clear
    dpddelay=15s

conn rw
    left=%any
    leftid=@vpn.example.com
    leftcert=serverCert.pem
    leftsendcert=always
    # Dual-stack full tunnel so the client can offer v4 + v6 (::/0) selectors.
    leftsubnet=0.0.0.0/0,::/0
    leftauth=pubkey
    right=%any
    rightauth=eap-mschapv2
    rightsendcert=never
    eap_identity=%identity
    # v4 pool plus a ULA v6 pool (CFG INTERNAL_IP6_ADDRESS source).
    rightsourceip=10.10.10.0/24,fd00:1::/112
    rightdns=1.1.1.1,2606:4700:4700::1111
    ike=aes256-sha256-curve25519-modp2048!
    esp=aes256gcm16-curve25519,chacha20poly1305-curve25519,aes256-sha256-curve25519!
    rekey=yes
    # Lower lifetime/margin to force frequent SERVER-initiated rekeys for
    # testing (e.g. lifetime=90s rekeymargin=30s → child rekey every ~60s).
    ikelifetime=4h
    lifetime=1h
    auto=add

# PSK roadwarrior: both sides authenticate with the pre-shared key in
# ipsec.secrets (keyed by @vpn.example.com / @client.test). No certificate is
# presented — mutual trust comes from the shared key.
conn rw-psk
    left=%any
    leftid=@vpn.example.com
    leftsubnet=0.0.0.0/0,::/0
    leftauth=psk
    right=%any
    rightid=@client.test
    rightauth=psk
    rightsourceip=10.10.10.0/24,fd00:1::/112
    rightdns=1.1.1.1,2606:4700:4700::1111
    ike=aes256-sha256-curve25519-modp2048!
    esp=aes256gcm16-curve25519,chacha20poly1305-curve25519,aes256-sha256-curve25519!
    rekey=yes
    ikelifetime=4h
    lifetime=1h
    auto=add
